<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iROAM — Integrated Route Operation & Anomaly Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #080D18;
  --s1:     #0F1624;
  --s2:     #162035;
  --s3:     #1E2D4A;
  --s4:     #253659;
  --border: rgba(255,255,255,0.07);
  --bhi:    rgba(255,255,255,0.13);
  --t1:     #E2E8F5;
  --t2:     #8A9CC0;
  --t3:     #4A5A7A;
  --accent: #E07B32;
  --acc2:   #1BB8B0;
  --bunch:  #4D9EFF;
  --idle:   #FF5A5A;
  --crowd:  #3DDB7E;
}
html, body, #root { height: 100%; background: var(--bg); color: var(--t1); overflow: hidden; font-family: 'IBM Plex Sans', sans-serif; }
button { font-family: inherit; }
input[type=range] { accent-color: var(--accent); cursor: pointer; width: 100%; height: 4px; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--s4); border-radius: 2px; }
select, input[type=date] { outline: none; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes prog { 0%{width:5%} 60%{width:75%} 100%{width:92%} }
@keyframes fadein { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes slideInRight { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─────────────────────────────────────────────────────────────────────────────
// DATA (live — backed by FastAPI /iroam/* endpoints)
// ─────────────────────────────────────────────────────────────────────────────
// The original design used a hard-coded Route 29 stop list + compact AVL_RAW;
// we now populate these module-level vars from /iroam/stops and /iroam/buses
// on every Apply. The JSX reads them directly, so components re-render when
// any piece of App state (busData / stopsVersion) changes.
let ROUTE29_STOPS = [];                  // [{ name, lat, lon }]
let STOPS = [];
let NUM_STOPS = 0;
let LAT_MIN = 0, LAT_MAX = 1, LON_MIN = 0, LON_MAX = 1;
let START_T = 360, END_T = 1320;         // 06:00 → 22:00 fallback; overwritten by /iroam/buses

// Route metadata — display names + per-route direction labels.
// The backend still speaks GTFS direction_id (0|1); `directionIdFor` below
// converts the display label back to an integer.
const ROUTE_META = {
  '29':  { name: 'Dufferin', directions: ['Northbound', 'Southbound'] },
  '510': { name: 'Spadina',  directions: ['Northbound', 'Southbound'] },
  '504': { name: 'King',     directions: ['Eastbound',  'Westbound']  },
  '7':   { name: 'Bathurst', directions: ['Northbound', 'Southbound'] },
  '35':  { name: 'Jane',     directions: ['Northbound', 'Southbound'] },
  '501': { name: 'Queen',    directions: ['Eastbound',  'Westbound']  },
  '506': { name: 'Carlton',  directions: ['Eastbound',  'Westbound']  },
  '25':  { name: 'Don Mills',directions: ['Northbound', 'Southbound'] },
  '36':  { name: 'Finch West',directions: ['Eastbound', 'Westbound']  },
};
const DIR_COLOR = { Northbound:'var(--acc2)', Eastbound:'var(--acc2)', Southbound:'#A78BFA', Westbound:'#A78BFA' };
const DIR_BG    = { Northbound:'rgba(27,184,176,0.1)', Eastbound:'rgba(27,184,176,0.1)', Southbound:'rgba(167,139,250,0.1)', Westbound:'rgba(167,139,250,0.1)' };
const DIR_SHORT = { Northbound:'↑ NB', Southbound:'↓ SB', Eastbound:'→ EB', Westbound:'← WB' };

const stopLatNorm = i => {
  if (NUM_STOPS < 2 || LAT_MAX === LAT_MIN) return NUM_STOPS < 2 ? 0 : i / (NUM_STOPS - 1);
  return (ROUTE29_STOPS[i].lat - LAT_MIN) / (LAT_MAX - LAT_MIN);
};
const stopLonNorm = i => {
  if (NUM_STOPS < 2 || LON_MAX === LON_MIN) return NUM_STOPS < 2 ? 0 : i / (NUM_STOPS - 1);
  return (ROUTE29_STOPS[i].lon - LON_MIN) / (LON_MAX - LON_MIN);
};

function applyStopsAndWindow(stopsPayload, timeWindow) {
  // Pass `null` for stopsPayload to leave the current stop list untouched
  // (used by the LIVE auto-refresh, which only wants to extend the window).
  if (stopsPayload !== null) {
    const stops = (stopsPayload && stopsPayload.stops) || [];
    ROUTE29_STOPS = stops.map(s => ({ name: s.name, lat: s.lat, lon: s.lon, distance_m: s.distance_m }));
    STOPS = ROUTE29_STOPS.map(s => s.name);
    NUM_STOPS = ROUTE29_STOPS.length;
    if (NUM_STOPS >= 2) {
      const lats = ROUTE29_STOPS.map(s => s.lat), lons = ROUTE29_STOPS.map(s => s.lon);
      LAT_MIN = Math.min(...lats); LAT_MAX = Math.max(...lats);
      LON_MIN = Math.min(...lons); LON_MAX = Math.max(...lons);
    }
  }
  if (timeWindow && timeWindow.start != null && timeWindow.end != null) {
    START_T = Math.max(0, Math.floor(timeWindow.start - 5));
    END_T   = Math.min(1440, Math.ceil(timeWindow.end + 5));
  }
}

function directionsFor(routeId) {
  return (ROUTE_META[routeId]?.directions) || ['Northbound', 'Southbound'];
}
// Map the display label back to the backend GTFS direction_id (0|1) by its
// index within the route's direction list. ROUTE_META ordering defines the
// contract (directions[0] == direction_id 0, directions[1] == direction_id 1).
function directionIdFor(dir, routeId) {
  const labels = directionsFor(routeId);
  const i = labels.indexOf(dir);
  return i >= 0 ? i : 0;
}

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${url} → HTTP ${r.status}`);
  return r.json();
}

// YYYY-MM-DD for "now" in the same timezone the analytics worker uses to
// compute service_date (ANALYTICS_WORKER_SERVICE_DATE_TZ=America/Toronto).
// Drives the LIVE auto-refresh: when params.date equals this, the dashboard
// polls /iroam/buses + /iroam/analytics on an interval.
function todayInToronto() {
  return new Intl.DateTimeFormat('en-CA', {
    timeZone: 'America/Toronto', year: 'numeric', month: '2-digit', day: '2-digit',
  }).format(new Date());
}

async function loadRouteCatalog() {
  try { return await fetchJSON('/iroam/routes'); } catch { return []; }
}

async function loadStopsOnly(route_id, direction_id) {
  try {
    const payload = await fetchJSON(`/iroam/stops?route_id=${encodeURIComponent(route_id)}&direction_id=${direction_id}`);
    applyStopsAndWindow(payload, null);
    return payload;
  } catch { return null; }
}

async function loadDashboardData(p) {
  const direction_id = directionIdFor(p.dir, p.route);
  const qs =
    `route_id=${encodeURIComponent(p.route)}` +
    `&service_date=${p.date}` +
    `&direction_id=${direction_id}` +
    `&bunch_sec=${p.bunchInt}` +
    `&idle_min=${p.idleMin}` +
    `&crowd_pct=${p.crowdPct}` +
    `&bunch_dist=${p.bunchDistM}` +
    `&bunch_method=${p.bunchMethod}`;
  const [stopsRes, busesRes, analyticsRes] = await Promise.all([
    fetchJSON(`/iroam/stops?route_id=${encodeURIComponent(p.route)}&direction_id=${direction_id}`),
    fetchJSON(`/iroam/buses?${qs}`),
    fetchJSON(`/iroam/analytics?${qs}`),
  ]);
  applyStopsAndWindow(stopsRes, busesRes.time_window);
  return { stopsRes, busesRes, analyticsRes };
}

const BUS_COLORS = [
  '#4D9EFF','#A78BFA','#1BB8B0','#FCD34D','#F472B6',
  '#60A5FA','#34D399','#FBBF24','#C084FC','#67E8F9',
];

// ─────────────────────────────────────────────────────────────────────────────
// ICONS
// ─────────────────────────────────────────────────────────────────────────────
const ICONS = {
  params:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M4 6h16M8 12h8M11 18h2"/></svg>,
  play:     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M6 4l13 8-13 8V4z"/></svg>,
  pause:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>,
  reset:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 .49-3.63"/></svg>,
  analysis: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>,
  bus:      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20M7 19v2M17 19v2"/><circle cx="7" cy="14" r="1.5" fill="currentColor"/><circle cx="17" cy="14" r="1.5" fill="currentColor"/></svg>,
  dot:      <svg viewBox="0 0 8 8"><circle cx="4" cy="4" r="3" fill="currentColor"/></svg>,
  chevron:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9,18 15,12 9,6"/></svg>,
};
const Ic = ({ n, size=16 }) => <span style={{ width: size, height: size, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{React.cloneElement(ICONS[n], { width: size, height: size })}</span>;

// ─────────────────────────────────────────────────────────────────────────────
// SHARED UI ATOMS
// ─────────────────────────────────────────────────────────────────────────────
const Tag = ({ children, color }) => (
  <span style={{ padding: '2px 8px', borderRadius: 4, fontSize: 11, fontWeight: 500,
    background: `${color}18`, color, border: `1px solid ${color}30` }}>{children}</span>
);

const Divider = ({ my = 20 }) => <div style={{ height: 1, background: 'var(--border)', margin: `${my}px 0` }} />;

const SecLabel = ({ children }) => (
  <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.09em', textTransform: 'uppercase',
    color: 'var(--t3)', marginBottom: 10 }}>{children}</div>
);

const Slider = ({ label, unit, min, max, step, value, onChange, color = 'var(--accent)', disabled = false }) => (
  <div style={{ marginBottom: 18, opacity: disabled ? 0.4 : 1, pointerEvents: disabled ? 'none' : 'auto' }}>
    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8, fontSize: 13 }}>
      <span style={{ color: 'var(--t2)' }}>{label}</span>
      <span style={{ fontFamily: 'IBM Plex Mono', color, fontWeight: 500, fontSize: 12 }}>{value}{unit}</span>
    </div>
    <input type="range" min={min} max={max} step={step} value={value}
      disabled={disabled}
      onChange={e => onChange(+e.target.value)}
      style={{ accentColor: color }} />
    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: 'var(--t3)', marginTop: 4 }}>
      <span>{min}{unit}</span><span>{max}{unit}</span>
    </div>
  </div>
);

const MethodToggle = ({ value, onChange, color }) => {
  const opts = [['time','Time'], ['distance','Distance'], ['both','Both']];
  return (
    <div style={{ display:'flex', gap:4, marginBottom:14, padding:3, background:'var(--bg2)',
      border:'1px solid var(--border)', borderRadius:6 }}>
      {opts.map(([k,l]) => (
        <button key={k} onClick={() => onChange(k)} style={{
          flex:1, padding:'5px 8px', fontSize:11, fontWeight:500, cursor:'pointer',
          border:'none', borderRadius:4,
          background: value === k ? color : 'transparent',
          color: value === k ? 'var(--bg)' : 'var(--t2)',
          fontFamily: 'inherit',
        }}>{l}</button>
      ))}
    </div>
  );
};

const AnomalyPill = ({ type, active, onClick }) => {
  const cfg = { bunch: ['var(--bunch)', '▲ Bunching'], idle: ['var(--idle)', '▲ Idling'], crowd: ['var(--crowd)', '● Crowding'] };
  const [color, label] = cfg[type];
  return (
    <button onClick={onClick} style={{
      display: 'flex', alignItems: 'center', gap: 5, padding: '5px 12px',
      borderRadius: 6, border: '1px solid', cursor: 'pointer',
      borderColor: active ? color : 'var(--border)',
      background: active ? `${color}14` : 'transparent',
      color: active ? color : 'var(--t3)', fontSize: 12,
      transition: 'all 0.15s',
    }}>{label}</button>
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────────────────────────────────────
const NAV = [
  { id: 'params',   label: 'Parameters', icon: 'params'   },
  { id: 'playback', label: 'Playback',   icon: 'play'     },
  { id: 'analysis', label: 'Analytics',  icon: 'analysis' },
];

const Sidebar = ({ active, setActive }) => (
  <aside style={{ width: 216, background: 'var(--s1)', borderRight: '1px solid var(--border)',
    display: 'flex', flexDirection: 'column', flexShrink: 0 }}>

    {/* Logo */}
    <div style={{ padding: '20px 18px 18px', borderBottom: '1px solid var(--border)' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <div style={{ width: 34, height: 34, borderRadius: 9, background: 'var(--accent)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: 'IBM Plex Mono', fontWeight: 500, fontSize: 12, color: '#fff', letterSpacing: '-0.03em' }}>iR</div>
        <div>
          <div style={{ fontWeight: 600, fontSize: 15, letterSpacing: '0.01em' }}>iROAM</div>
          <div style={{ fontSize: 10, color: 'var(--t3)', letterSpacing: '0.06em' }}>ROUTE MONITOR</div>
        </div>
      </div>
    </div>

    {/* Nav */}
    <nav style={{ padding: '12px 10px', flex: 1 }}>
      <SecLabel>Dashboard</SecLabel>
      {NAV.map(n => {
        const on = active === n.id;
        return (
          <button key={n.id} onClick={() => setActive(n.id)} style={{
            display: 'flex', alignItems: 'center', gap: 9, width: '100%',
            padding: '8px 10px', borderRadius: 7, border: 'none', cursor: 'pointer',
            background: on ? 'var(--s3)' : 'transparent',
            color: on ? 'var(--t1)' : 'var(--t2)',
            fontSize: 13.5, fontWeight: on ? 500 : 400, marginBottom: 2,
            transition: 'all 0.14s',
          }}>
            <span style={{ color: on ? 'var(--accent)' : 'var(--t3)' }}><Ic n={n.icon} size={15} /></span>
            {n.label}
            {on && <div style={{ marginLeft: 'auto', width: 5, height: 5, borderRadius: '50%', background: 'var(--accent)' }} />}
          </button>
        );
      })}
    </nav>

    {/* Footer */}
    <div style={{ padding: '14px 18px', borderTop: '1px solid var(--border)' }}>
      <div style={{ fontSize: 10, color: 'var(--t3)', lineHeight: 1.6 }}>Transit Analytics Lab<br/>University of Toronto</div>
    </div>
  </aside>
);

// ─────────────────────────────────────────────────────────────────────────────
// TOP BAR
// ─────────────────────────────────────────────────────────────────────────────
const TopBar = ({ page, route, date, dir, drawerOpen, setDrawerOpen, totals, isLive }) => {
  const titles = { params: 'Parameter Configuration', playback: 'Route Playback', analysis: 'Visual Analytics' };
  const dirColor = DIR_COLOR[dir] || 'var(--acc2)';
  return (
    <div style={{ height: 52, background: 'var(--s1)', borderBottom: '1px solid var(--border)',
      display: 'flex', alignItems: 'center', padding: '0 22px', gap: 18, flexShrink: 0 }}>
      <span style={{ fontWeight: 600, fontSize: 14 }}>{titles[page]}</span>
      <div style={{ width: 1, height: 18, background: 'var(--bhi)' }} />
      <div style={{ display: 'flex', gap: 14, fontSize: 13, color: 'var(--t2)', alignItems: 'center' }}>
        <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
          <Ic n="bus" size={13} />
          <span style={{ color: 'var(--accent)', fontWeight: 600 }}>Route {route}</span>
        </span>
        <span style={{ fontFamily: 'IBM Plex Mono', fontSize: 12 }}>{date}</span>
        <Tag color={dirColor}>{dir}</Tag>
      </div>
      <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 16 }}>
        <div style={{ display: 'flex', gap: 12 }}>
          {(() => {
            const bt = (totals && totals.bunch_time) || 0;
            const bd = (totals && totals.bunch_dist) || 0;
            // Only show the "(A time · B dist)" split when both detectors
            // actually produced events — avoids clutter for the common
            // single-method case.
            const split = bt > 0 && bd > 0 ? ` (${bt} time · ${bd} dist)` : '';
            return [
              ['var(--bunch)', `${(totals && totals.bunch) || 0} Bunching`, split],
              ['var(--idle)',  `${(totals && totals.idle)  || 0} Idling`,   ''],
              ['var(--crowd)', `${(totals && totals.crowd) || 0} Crowding`, ''],
            ];
          })().map(([c,l,sub]) => (
            <span key={l} style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, color: 'var(--t3)' }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: c, display: 'inline-block' }} />{l}
              {sub && <span style={{ opacity: 0.7, fontSize: 10 }}>{sub}</span>}
            </span>
          ))}
        </div>
        <div style={{ width: 1, height: 18, background: 'var(--bhi)' }} />
        <span
          title={isLive ? 'Auto-refreshing today\'s data every 25 s' : 'Historical date — auto-refresh off'}
          style={{ fontSize: 11, fontFamily: 'IBM Plex Mono',
            color: isLive ? 'var(--t2)' : 'var(--t3)', opacity: isLive ? 1 : 0.55 }}
        >
          <span style={{
            color: isLive ? 'var(--crowd)' : 'var(--t3)',
            marginRight: 5, display: 'inline-block',
            animation: isLive ? 'pulse 2s ease infinite' : 'none',
          }}>●</span>LIVE
        </span>
        {page !== 'params' && (
          <>
            <div style={{ width: 1, height: 18, background: 'var(--bhi)' }} />
            <button onClick={() => setDrawerOpen(o => !o)} style={{
              display: 'flex', alignItems: 'center', gap: 6, padding: '5px 12px',
              borderRadius: 7, border: '1px solid', cursor: 'pointer',
              borderColor: drawerOpen ? 'var(--accent)' : 'var(--border)',
              background: drawerOpen ? 'rgba(224,123,50,0.12)' : 'var(--s2)',
              color: drawerOpen ? 'var(--accent)' : 'var(--t2)',
              fontSize: 12, fontWeight: 500, transition: 'all 0.15s',
            }}>
              <Ic n="params" size={13} />
              Parameters
              <span style={{ fontSize: 10, opacity: 0.7 }}>{drawerOpen ? '✕' : '⊞'}</span>
            </button>
          </>
        )}
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// PARAMETER PANEL
// ─────────────────────────────────────────────────────────────────────────────
const ParameterPanel = ({ params, setP, onApply, applying, routeCatalog, stopsVersion }) => {
  const { route, date, dir, bunchInt, idleMin, crowdPct, bunchDistM, bunchMethod, stops } = params;

  const toggleStop = s => setP(p => ({
    ...p, stops: p.stops.includes(s) ? p.stops.filter(x => x !== s) : [...p.stops, s]
  }));

  const routeIds = useMemo(() => {
    const seen = new Set();
    (routeCatalog || []).forEach(r => seen.add(r.route_id));
    return Array.from(seen).sort((a,b) => {
      const an = Number(a), bn = Number(b);
      if (!Number.isNaN(an) && !Number.isNaN(bn)) return an - bn;
      return String(a).localeCompare(String(b));
    });
  }, [routeCatalog]);

  const wantDirId = dir === 'Northbound' ? 1 : 0;
  const serviceDates = useMemo(() => {
    const entry = (routeCatalog || []).find(r => r.route_id === route && r.direction_id === wantDirId);
    return entry ? entry.service_dates : [];
  }, [routeCatalog, route, wantDirId]);

  const bunchVal =
    bunchMethod === 'time'     ? `${bunchInt} sec`
  : bunchMethod === 'distance' ? `${bunchDistM} m`
                               : `${bunchInt} s · ${bunchDistM} m`;
  const summary = [
    { label: 'Route',      val: `Route ${route}` },
    { label: 'Date',       val: date },
    { label: 'Direction',  val: dir },
    { label: 'Bunching ≤', val: bunchVal,           color: 'var(--bunch)' },
    { label: 'Idling ≥',   val: `${idleMin} min`,   color: 'var(--idle)' },
    { label: 'Crowding ≥', val: `${crowdPct}%`,     color: 'var(--crowd)' },
    { label: 'Stops',      val: stops.length ? `${stops.length} filtered` : 'All' },
  ];

  const sel = v => ({
    flex: 1, background: 'var(--s2)', border: '1px solid var(--border)', borderRadius: 7,
    color: 'var(--t1)', padding: '8px 12px', fontSize: 13, cursor: 'pointer', colorScheme: 'dark',
  });

  return (
    <div style={{ display: 'flex', height: '100%', overflow: 'hidden', animation: 'fadein 0.2s ease' }}>

      {/* ── Col 1: Route config ── */}
      <div style={{ width: 300, borderRight: '1px solid var(--border)', padding: 24, overflowY: 'auto' }}>
        <SecLabel>Route Configuration</SecLabel>

        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 12, color: 'var(--t3)', marginBottom: 6 }}>Route</div>
          <select value={route} onChange={e => setP(p => ({ ...p, route: e.target.value }))} style={sel()}>
            {routeIds.length === 0
              ? <option value={route}>Route {route}{ROUTE_META[route] ? ` — ${ROUTE_META[route].name}` : ''}</option>
              : routeIds.map(r => <option key={r} value={r}>Route {r}{ROUTE_META[r] ? ` — ${ROUTE_META[r].name}` : ''}</option>)}
          </select>
        </div>

const SPEED_OPTIONS = [0.5, 1, 2, 4];

const PlaybackPage = ({ busData, sliceKey, isLive, route, serviceDate, directionId, liveTimeWindowEnd }) => {
  const [playing, setPlaying] = useState(false);
  const [t, setT] = useState(START_T);
  const [vis, setVis] = useState({ bunch: true, idle: true, crowd: true });
  const [mapW, setMapW] = useState(270);
  const [dragging, setDragging] = useState(false);
  const [speed, setSpeed] = useState(1);
  const [forecastOpen, setForecastOpen] = useState(false);
  const [forecasting, setForecasting] = useState(false);
  const [forecast, setForecast] = useState(null);
  const [forecastError, setForecastError] = useState(null);
  const chartRef = useRef(null);
  const rafRef = useRef(null);

  // Close & drop any stale forecast the moment the slice changes.
  useEffect(() => {
    setForecastOpen(false); setForecast(null); setForecastError(null);
  }, [sliceKey]);

  const runForecast = async () => {
    if (!route || !serviceDate) return;
    // t_ref: live mode pins to the backend's latest reported minute so the
    // request is never ahead of what the model has evidence for. Historical
    // mode uses the current playhead (paused or not — either case shows the
    // user what they're looking at).
    const t_ref = isLive
      ? (liveTimeWindowEnd != null ? liveTimeWindowEnd : t)
      : t;
    setForecasting(true);
    setForecastOpen(true);
    setForecastError(null);
    try {
      const qs =
        `route_id=${encodeURIComponent(route)}` +
        `&service_date=${serviceDate}` +
        `&direction_id=${directionId}` +
        `&t_ref_min=${encodeURIComponent(t_ref.toFixed(3))}`;
      const payload = await fetchJSON(`/iroam/forecast?${qs}`);
      setForecast(adaptForecast(payload));
    } catch (err) {
      console.warn('forecast failed', err);
      setForecastError(String(err && err.message || err));
      setForecast(null);
    } finally {
      setForecasting(false);
    }
  };

  useEffect(() => {
    if (!dragging) return;
    const onMove = e => {
      const rect = chartRef.current?.getBoundingClientRect();
      if (!rect) return;
      const w = rect.right - e.clientX;
      setMapW(Math.max(180, Math.min(600, w)));
    };
    const onUp = () => setDragging(false);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    };
  }, [dragging]);

  const fmt = m => {
    const h = Math.floor(m / 60), mn = Math.floor(m % 60);
    return `${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;
  };

  // Snap the playhead back to the window start only when the slice itself
  // changes (route/date/dir). LIVE-mode refreshes swap busData for the same
  // slice and must not yank the playhead.
  useEffect(() => { setT(START_T); setPlaying(false); }, [sliceKey]);

  // Keep the rAF callback free of stale `speed` closures.
  const speedRef = useRef(speed);
  useEffect(() => { speedRef.current = speed; }, [speed]);

  useEffect(() => {
    if (playing) {
      const step = () => {
        setT(cur => {
          if (cur >= END_T) { setPlaying(false); return END_T; }
          return cur + 1.5 * speedRef.current;
        });
        rafRef.current = requestAnimationFrame(step);
      };
      rafRef.current = requestAnimationFrame(step);
    } else cancelAnimationFrame(rafRef.current);
    return () => cancelAnimationFrame(rafRef.current);
  }, [playing]);

  const pct = (t - START_T) / (END_T - START_T) * 100;

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', animation:'fadein 0.2s ease' }}>

      {/* Controls */}
      <div style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 20px',
        borderBottom:'1px solid var(--border)', background:'var(--s1)', flexShrink:0 }}>

        <button onClick={() => setPlaying(p => !p)} style={{
          width:34, height:34, borderRadius:7, border:'1px solid',
          borderColor: playing ? 'var(--accent)' : 'var(--border)',
          background: playing ? 'rgba(224,123,50,0.15)' : 'var(--s2)',
          color: playing ? 'var(--accent)' : 'var(--t1)', cursor:'pointer',
          display:'flex', alignItems:'center', justifyContent:'center',
        }}><Ic n={playing ? 'pause' : 'play'} size={13} /></button>

        <button onClick={() => { setT(START_T); setPlaying(false); }} style={{
          width:34, height:34, borderRadius:7, border:'1px solid var(--border)',
          background:'var(--s2)', color:'var(--t2)', cursor:'pointer',
          display:'flex', alignItems:'center', justifyContent:'center',
        }}><Ic n="reset" size={13} /></button>

        <button
          onClick={() => {
            const i = SPEED_OPTIONS.indexOf(speed);
            setSpeed(SPEED_OPTIONS[(i + 1) % SPEED_OPTIONS.length]);
          }}
          title={`Playback speed (click to cycle): ${speed}×`}
          style={{
            height:34, minWidth:44, padding:'0 8px', borderRadius:7, border:'1px solid',
            borderColor: speed !== 1 ? 'var(--accent)' : 'var(--border)',
            background: speed !== 1 ? 'rgba(224,123,50,0.15)' : 'var(--s2)',
            color: speed !== 1 ? 'var(--accent)' : 'var(--t1)',
            cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
            fontFamily:'IBM Plex Mono', fontSize:12, fontWeight:500,
          }}
        >{speed}×</button>

        <div style={{ flex:1, display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ fontFamily:'IBM Plex Mono', fontSize:12, color:'var(--accent)', minWidth:40 }}>{fmt(t)}</span>
          <div style={{ flex:1, cursor:'pointer', padding:'6px 0' }} onClick={e => {
            const r = e.currentTarget.getBoundingClientRect();
            setT(START_T + ((e.clientX - r.left) / r.width) * (END_T - START_T));
          }}>
            <div style={{ height:4, background:'var(--s3)', borderRadius:2, position:'relative' }}>
              <div style={{ position:'absolute', left:0, top:0, height:'100%', width:`${pct}%`,
                background:'linear-gradient(90deg,var(--accent),#f0a060)', borderRadius:2,
                transition:'width 0.05s linear' }} />
              <div style={{ position:'absolute', top:'50%', left:`${pct}%`, transform:'translate(-50%,-50%)',
                width:10, height:10, borderRadius:'50%', background:'var(--accent)',
                border:'2px solid var(--bg)', transition:'left 0.05s linear' }} />
            </div>
          </div>
          <span style={{ fontFamily:'IBM Plex Mono', fontSize:12, color:'var(--t3)', minWidth:40 }}>{fmt(END_T)}</span>
        </div>

        <div style={{ display:'flex', gap:6 }}>
          {(['bunch','idle','crowd']).map(k => (
            <AnomalyPill key={k} type={k} active={vis[k]} onClick={() => setVis(v => ({ ...v, [k]: !v[k] }))} />
          ))}
        </div>

        <button onClick={runForecast} disabled={forecasting || !route || !serviceDate} style={{
          padding:'0 12px', height:30, borderRadius:7,
          border:'1px solid', borderColor: forecastOpen ? 'var(--accent)' : 'var(--border)',
          background: forecastOpen ? 'linear-gradient(180deg, rgba(224,123,50,0.22), rgba(224,123,50,0.08))' : 'var(--s2)',
          color: forecastOpen ? 'var(--accent)' : 'var(--t1)',
          cursor: forecasting ? 'wait' : 'pointer', fontSize:12, fontWeight:600,
          display:'flex', alignItems:'center', gap:7, transition:'all 0.15s',
        }}>
          <span style={{ fontSize:13, lineHeight:1 }}>{forecasting ? '◐' : '◔'}</span>
          {forecasting ? 'Forecasting…' : 'Forecast Bunching'}
        </button>
      </div>

      {/* Chart area */}
      <div ref={chartRef} style={{ flex:1, display:'flex', overflow:'hidden' }}>
        <TDDiagram busData={busData} currentT={t} vis={vis} fmt={fmt} />
        <div
          onMouseDown={() => setDragging(true)}
          title="Drag to resize spatial view"
          style={{
            width: 6, cursor: 'col-resize', flexShrink: 0,
            background: dragging ? 'var(--accent)' : 'var(--border)',
            transition: dragging ? 'none' : 'background 0.15s ease',
            position: 'relative',
          }}
          onMouseEnter={e => { if (!dragging) e.currentTarget.style.background = 'var(--bhi)'; }}
          onMouseLeave={e => { if (!dragging) e.currentTarget.style.background = 'var(--border)'; }}
        >
          <div style={{
            position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)',
            width: 2, height: 28, background: dragging ? 'white' : 'var(--t3)', borderRadius: 1,
            opacity: dragging ? 1 : 0.5, pointerEvents: 'none',
          }} />
        </div>
        <div style={{ width: mapW, flexShrink: 0, display: 'flex' }}>
          <SchematicMap busData={busData} currentT={t} vis={vis} width={mapW} />
        </div>
      </div>
      {forecastOpen && (
        <ForecastPanel
          forecast={forecast}
          forecasting={forecasting}
          forecastError={forecastError}
          isLive={isLive}
          fmt={fmt}
          onClose={() => setForecastOpen(false)}
        />
      )}
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// FORECAST PANEL
// ─────────────────────────────────────────────────────────────────────────────
// Translate the backend /iroam/forecast payload into the shape the panel
// renders. any_alert_rate is a per-horizon fraction of eligible buses that
// trip at least one threshold; mean_prob is the cross-bus mean probability.
// We render any_alert_rate as the main curve and ±6 pp around mean_prob as
// a spread band (spread only — not a calibrated confidence interval).
function adaptForecast(payload) {
  const stepMin = (payload.step_seconds || 10) / 60;
  const tRef = payload.t_ref_min;
  const alertRate = payload.horizon_summary?.any_alert_rate || [];
  const meanProb  = payload.horizon_summary?.mean_prob || [];
  const H = Math.max(alertRate.length, meanProb.length);
  const horizon = Array.from({ length: H }, (_, i) => {
    const rate = (alertRate[i] ?? 0) * 100;
    const mean = (meanProb[i]  ?? 0) * 100;
    return {
      t: tRef + i * stepMin,
      rate,
      lo: Math.max(0, mean - 6),
      hi: Math.min(100, mean + 6),
    };
  });
  const peakRate = horizon.length ? Math.max(...horizon.map(h => h.rate)) : 0;
  const peakIdx  = horizon.findIndex(h => h.rate === peakRate);
  const peakAt   = peakIdx >= 0 ? horizon[peakIdx].t : tRef;

  const perBus = payload.per_bus || [];
  const eligible = perBus.filter(b => b.eligible);
  const ineligible = perBus.filter(b => !b.eligible);
  const busRisks = eligible
    .slice()
    .sort((a, b) => (b.max_prob ?? 0) - (a.max_prob ?? 0))
    .slice(0, 6)
    .map(b => ({
      id: b.bus_id,
      vehicle_id: b.vehicle_id,
      stop_idx: b.stop_idx ?? 0,
      risk: Math.round((b.max_prob ?? 0) * 100),
      first_step: b.first_alert_step,
      step_seconds: payload.step_seconds || 10,
    }));
  // Bucket ineligibles by reason for the collapsed pill.
  const reasonBuckets = {};
  for (const b of ineligible) {
    const key = (b.ineligible_reason || 'unknown').split(':')[0].trim();
    reasonBuckets[key] = (reasonBuckets[key] || 0) + 1;
  }
  return {
    horizon, peakRate, peakAt,
    fromT: tRef,
    horizonMin: Math.round(H * stepMin),
    busRisks,
    ineligible,
    reasonBuckets,
    numEligible: payload.num_eligible ?? eligible.length,
    numRunning: payload.num_running ?? 0,
    numTotal: payload.num_buses_total ?? perBus.length,
  };
}

        </div>
        {forecasting ? (
          <div style={{ fontFamily: 'IBM Plex Mono', fontSize: 11, color: 'var(--accent)' }}>
            ◐ Computing…
          </div>
        ) : forecastError ? (
          <div style={{ fontSize: 11, color: 'var(--idle)', lineHeight: 1.4 }}>

          </div>
        ) : forecast ? (
          <>
            <div>
              <div style={{ fontSize: 10, color: 'var(--t3)', marginBottom: 2 }}>PEAK ALERT RATE</div>

              </div>

              <div>{forecast.numEligible} eligible / {forecast.numRunning} running / {forecast.numTotal} total</div>
            </div>
            <div style={{ marginTop: 'auto', fontSize: 10, color: 'var(--t3)' }}>
              confidence — <span style={{ color: 'var(--t3)' }}>not reported</span>
            </div>
          </>
        ) : null}
      </div>

      {/* Time-series forecast curve */}
      <div style={{ flex: 1.4, padding: '10px 16px', borderRight: '1px solid var(--border)', display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        <div style={{ fontSize: 11, color: 'var(--t2)', marginBottom: 4 }}>

        </div>

          <ForecastCurve forecast={forecast} forecasting={forecasting} fmt={fmt} />
        </div>
      </div>

          ) : forecast.busRisks.map(b => {
            const color = b.risk >= 70 ? 'var(--bunch)' : b.risk >= 45 ? 'var(--idle)' : 'var(--acc2)';
            const firstMin = b.first_step != null
              ? `+${Math.round(b.first_step * b.step_seconds / 60 * 10) / 10}m`
              : '—';
            return (
              <div key={b.id} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:5, fontSize:11 }}>
                <div style={{ width:6, height:6, borderRadius:'50%', background:color, flexShrink:0 }} />
                <div style={{ fontFamily:'IBM Plex Mono', color:'var(--t1)', width:70, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                  #{b.vehicle_id || b.id}
                </div>
                <div style={{ flex:1, color:'var(--t3)', fontSize:10 }}>
                  stop {Math.floor(b.stop_idx)+1} / {NUM_STOPS} · 1st {firstMin}
                </div>
                <div style={{ fontFamily:'IBM Plex Mono', color, width:36, textAlign:'right', fontWeight:600 }}>
                  {b.risk}%
                </div>
              </div>
            );
          })}
        </div>

        {forecast && forecast.ineligible.length > 0 && (
          <div>
            <button
              onClick={() => setShowExcluded(v => !v)}
              style={{
                background:'transparent', border:'1px solid var(--border)', borderRadius:6,
                padding:'3px 8px', color:'var(--t3)', fontSize:10, cursor:'pointer',
                display:'flex', alignItems:'center', gap:6,
              }}
            >
              <span>⊘ {forecast.ineligible.length} excluded</span>
              <span style={{ fontFamily:'IBM Plex Mono', color:'var(--t3)' }}>
                {Object.entries(forecast.reasonBuckets).map(([k,v]) => `${k}:${v}`).join(' · ')}
              </span>
              <span>{showExcluded ? '▾' : '▸'}</span>
            </button>
            {showExcluded && (
              <div style={{ marginTop:6, maxHeight:110, overflow:'auto',
                border:'1px solid var(--border)', borderRadius:6, padding:'6px 8px' }}>
                {forecast.ineligible.map(b => (
                  <div key={b.bus_id} style={{ display:'flex', gap:8, fontSize:10.5, color:'var(--t3)', marginBottom:3 }}>
                    <div style={{ fontFamily:'IBM Plex Mono', width:70, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', color:'var(--t2)' }}>
                      #{b.vehicle_id || b.bus_id}
                    </div>
                    <div style={{ flex:1 }}>{b.ineligible_reason || 'unknown'}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

const ForecastCurve = ({ forecast, forecasting, fmt }) => {
  const ref = useRef(null);
  const [dims, setDims] = useState({ w: 400, h: 160 });
  useEffect(() => {
    if (!ref.current) return;
    const obs = new ResizeObserver(([e]) => {
      setDims({ w: Math.max(e.contentRect.width, 200), h: Math.max(e.contentRect.height, 100) });
    });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  const { w: W, h: H } = dims;
  const PAD = { top: 12, right: 16, bottom: 22, left: 32 };
  if (forecasting || !forecast || forecast.horizon.length === 0) {
    return (
      <div ref={ref} style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--t3)', fontSize:11 }}>
        {forecasting ? '◐ Running model…' : 'Click Forecast to predict'}
      </div>
    );
  }
  const h = forecast.horizon;
  const tMin = h[0].t, tMax = h[h.length-1].t;
  // Round vMax up to nearest 10 but clamp at 100 (rate is a %).
  const dataMax = Math.max(...h.map(p => p.hi));
  const vMax = Math.min(100, Math.max(20, Math.ceil(dataMax / 10) * 10));
  const xS = t => PAD.left + (t - tMin) / Math.max(1e-6, (tMax - tMin)) * (W - PAD.left - PAD.right);
  const yS = v => PAD.top + (1 - v / vMax) * (H - PAD.top - PAD.bottom);
  const linePath = h.map((p, i) => `${i===0?'M':'L'}${xS(p.t).toFixed(1)},${yS(p.rate).toFixed(1)}`).join(' ');
  const bandPath =
    h.map((p, i) => `${i===0?'M':'L'}${xS(p.t).toFixed(1)},${yS(p.hi).toFixed(1)}`).join(' ') +
    ' ' +
    h.slice().reverse().map(p => `L${xS(p.t).toFixed(1)},${yS(p.lo).toFixed(1)}`).join(' ') +
    ' Z';
  const yTicks = [0, 25, 50, 75, 100].filter(v => v <= vMax);
  // 1-min ticks across the 5-min horizon, plus endpoints.
  const xTicks = [];
  for (let m = Math.ceil(tMin); m <= Math.floor(tMax); m += 1) xTicks.push(m);
  if (!xTicks.length) xTicks.push(tMin, tMax);

  return (
    <div ref={ref} style={{ width:'100%', height:'100%' }}>
      <svg width={W} height={H} style={{ display:'block' }}>
        {yTicks.map(v => (
          <g key={v}>
            <line x1={PAD.left} x2={W-PAD.right} y1={yS(v)} y2={yS(v)} stroke="rgba(255,255,255,0.05)" />
            <text x={PAD.left-6} y={yS(v)+3} textAnchor="end" fontSize={9} fill="rgba(255,255,255,0.35)" fontFamily="IBM Plex Mono">{v}</text>
          </g>
        ))}
        {xTicks.map(tk => (
          <text key={tk} x={xS(tk)} y={H-PAD.bottom+14} textAnchor="middle" fontSize={9} fill="rgba(255,255,255,0.4)" fontFamily="IBM Plex Mono">{fmt(tk)}</text>
        ))}
        {/* Mean-prob ±6pp spread band */}
        <path d={bandPath} fill="var(--bunch)" opacity={0.12} />
        {/* Alert-rate line */}
        <path d={linePath} fill="none" stroke="var(--bunch)" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" />
        {/* Peak marker */}
        <circle cx={xS(forecast.peakAt)} cy={yS(forecast.peakRate)} r={4} fill="var(--bunch)" stroke="var(--bg)" strokeWidth={1.5} />
        <text x={xS(forecast.peakAt)} y={yS(forecast.peakRate)-8} textAnchor="middle" fontSize={9}
          fill="var(--bunch)" fontFamily="IBM Plex Mono" fontWeight="600">{forecast.peakRate.toFixed(0)}%</text>
      </svg>
    </div>
  );
};

const TDDiagram = ({ busData, currentT, vis, fmt }) => {
  const containerRef = useRef(null);
  const [dims, setDims] = useState({ w: 760, h: 460 });

  useEffect(() => {
    if (!containerRef.current) return;
    const obs = new ResizeObserver(([entry]) => {
      const { width, height } = entry.contentRect;
      setDims({ w: Math.max(width, 300), h: Math.max(height - 28, 200) });
    });
    obs.observe(containerRef.current);
    return () => obs.disconnect();
  }, []);

  const W = dims.w, H = dims.h;
  const PAD = { top: 24, right: 28, bottom: 40, left: 86 };
  const xS = t => PAD.left + (t - START_T) / (END_T - START_T) * (W - PAD.left - PAD.right);
  const yS = d => {
    const lo = Math.floor(Math.min(d, NUM_STOPS - 2));
    const t = d - lo;
    const yLo = PAD.top + (1 - stopLatNorm(lo))     * (H - PAD.top - PAD.bottom);
    const yHi = PAD.top + (1 - stopLatNorm(lo + 1)) * (H - PAD.top - PAD.bottom);
    return yLo + t * (yHi - yLo);
  };
  const xTicks = (() => {
    const span = Math.max(1, END_T - START_T);
    const stepM = span > 360 ? 120 : span > 120 ? 60 : span > 40 ? 30 : span > 20 ? 15 : 5;
    const first = Math.ceil(START_T / stepM) * stepM;
    const out = [];
    for (let v = first; v <= END_T; v += stepM) out.push(v);
    return out;
  })();

  return (
    <div ref={containerRef} style={{ flex:1, borderRight:'1px solid var(--border)', overflow:'hidden', position:'relative', display:'flex', flexDirection:'column', minWidth:300 }}>
      <div style={{ padding:'10px 16px 0', fontSize:10, color:'var(--t3)', letterSpacing:'0.08em', textTransform:'uppercase', flexShrink:0 }}>Time–Distance Diagram</div>
      <svg width="100%" height="100%" style={{ display:'block', flex:1 }}>

        {/* Grid */}
        {xTicks.map(tick => (
          <g key={tick}>
            <line x1={xS(tick)} y1={PAD.top} x2={xS(tick)} y2={H - PAD.bottom}
              stroke="rgba(255,255,255,0.04)" strokeWidth={1} />
            <text x={xS(tick)} y={H - PAD.bottom + 14} textAnchor="middle" fontSize={9} fill="rgba(255,255,255,0.28)">{fmt(tick)}</text>
          </g>
        ))}
        {ROUTE29_STOPS.map((s, i) => (
          <g key={s.name}>
            <line x1={PAD.left} y1={yS(i)} x2={W - PAD.right} y2={yS(i)}
              stroke={i % 4 === 0 ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.025)'} strokeWidth={1} />
            <text x={PAD.left - 7} y={yS(i) + 3.5} textAnchor="end" fontSize={9.5} fill="rgba(255,255,255,0.32)">{s.name}</text>
          </g>
        ))}

        {/* Peak shading — AM + PM, clipped to the visible window */}
        {[[480,600],[1020,1140]]
          .filter(([a,b]) => b > START_T && a < END_T)
          .map(([a,b], i) => {
            const aa = Math.max(a, START_T), bb = Math.min(b, END_T);
            return (
              <rect key={i} x={xS(aa)} y={PAD.top} width={xS(bb)-xS(aa)} height={H - PAD.top - PAD.bottom}
                fill="rgba(255,255,255,0.02)" />
            );
          })}

        {/* Trajectories */}
        {busData.map((bus, idx) => {
          const pts = bus.points.filter(p => p.t <= currentT);
          if (pts.length < 2) return null;
          const d = pts.map((p, i) => `${i===0?'M':'L'}${xS(p.t).toFixed(1)},${yS(p.d).toFixed(1)}`).join(' ');
          return <path key={bus.id} d={d} fill="none"
            stroke={BUS_COLORS[idx % BUS_COLORS.length]} strokeWidth={1.8}
            opacity={0.75} strokeLinecap="round" strokeLinejoin="round" />;
        })}

        {/* Anomaly markers */}
        {busData.flatMap((bus, idx) =>
          bus.anomalies.filter(a => a.t <= currentT && vis[a.type]).map((a, j) => {
            const x = xS(a.t), y = yS(a.d);
            const color = a.type === 'bunch' ? 'var(--bunch)' : a.type === 'idle' ? 'var(--idle)' : 'var(--crowd)';
            if (a.type === 'crowd') return <circle key={`${bus.id}-${j}`} cx={x} cy={y} r={4.5} fill={color} opacity={0.9} stroke="var(--bg)" strokeWidth={1} />;
            return <polygon key={`${bus.id}-${j}`} points={`${x},${y-6} ${x-4.5},${y+3.5} ${x+4.5},${y+3.5}`} fill={color} opacity={0.9} />;
          })
        )}

        {/* Playhead */}
        <line x1={xS(currentT)} y1={PAD.top} x2={xS(currentT)} y2={H - PAD.bottom}
          stroke="var(--accent)" strokeWidth={1.5} strokeDasharray="5,3" opacity={0.85} />
        <polygon points={`${xS(currentT)},${PAD.top} ${xS(currentT)-5},${PAD.top-9} ${xS(currentT)+5},${PAD.top-9}`}
          fill="var(--accent)" />

        {/* Axis labels */}
        <text x={(PAD.left + W - PAD.right) / 2} y={H - 4} textAnchor="middle" fontSize={9} fill="rgba(255,255,255,0.2)">Time of Day</text>
      </svg>
    </div>
  );
};

const SchematicMap = ({ busData, currentT, vis }) => {
  const containerRef = useRef(null);
  const [dims, setDims] = useState({ w: 270, h: 500 });

  useEffect(() => {
    if (!containerRef.current) return;
    const obs = new ResizeObserver(([entry]) => {
      const { width, height } = entry.contentRect;
      setDims({ w: Math.max(width, 120), h: Math.max(height - 30, 200) });
    });
    obs.observe(containerRef.current);
    return () => obs.disconnect();
  }, []);

  const W = dims.w, H = dims.h;
  const PAD = { top: 24, bottom: 20, left: 10, right: 10 };
  const rx = W / 2; // centered route line

  const yP = i => {
    const norm = stopLatNorm(i);
    return H - PAD.bottom - norm * (H - PAD.top - PAD.bottom);
  };
  const xP = () => rx;

  const interpY = d => {
    const lo = Math.floor(Math.min(d, NUM_STOPS - 2));
    const t = d - lo;
    return yP(lo) + t * (yP(lo + 1) - yP(lo));
  };
  const interpX = d => {
    const lo = Math.floor(Math.min(d, NUM_STOPS - 2));
    const t = d - lo;
    return xP(lo) + t * (xP(lo + 1) - xP(lo));
  };

  const activeBuses = busData.map((bus, idx) => {
    const pts = bus.points.filter(p => p.t <= currentT);
    if (!pts.length) return null;
    return { ...bus, d: pts[pts.length - 1].d, idx };
  }).filter(Boolean);

  const anomHeat = {};
  busData.forEach(bus => bus.anomalies.filter(a => a.t <= currentT && vis[a.type]).forEach(a => {
    const si = Math.round(a.d);
    anomHeat[si] = (anomHeat[si] || 0) + 1;
  }));

  const routePath = ROUTE29_STOPS.map((_, i) =>
    `${i === 0 ? 'M' : 'L'}${rx.toFixed(1)},${yP(i).toFixed(1)}`
  ).join(' ');

  return (
    <div ref={containerRef} style={{ width: '100%', overflow: 'hidden', position: 'relative', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '10px 16px 0', fontSize: 10, color: 'var(--t3)', letterSpacing: '0.08em', textTransform: 'uppercase', flexShrink: 0 }}>
        Spatial View · GTFS
      </div>
      <svg width="100%" height="100%" style={{ display: 'block', flex: 1 }}>

        {/* Route glow + line */}
        <path d={routePath} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={8} strokeLinecap="round" strokeLinejoin="round" />
        <path d={routePath} fill="none" stroke="rgba(255,255,255,0.14)" strokeWidth={3} strokeLinecap="round" strokeLinejoin="round" />

        {/* Anomaly heat halos */}
        {Object.entries(anomHeat).map(([si, cnt]) => (
          <circle key={si} cx={rx} cy={yP(+si)} r={7 + cnt * 3} fill="var(--idle)" opacity={0.09} />
        ))}

        {/* Stops — proportionally spaced by real latitude */}
        {ROUTE29_STOPS.map((s, i) => (
          <g key={s.name}>
            <circle cx={rx} cy={yP(i)} r={5} fill="var(--s3)" stroke="rgba(255,255,255,0.28)" strokeWidth={1.8} />
            <text x={rx - 14} y={yP(i) + 4} textAnchor="end" fontSize={11} fill="rgba(255,255,255,0.5)">{s.name}</text>
          </g>
        ))}

        {/* Active bus markers */}
        {activeBuses.map(bus => {
          const by = interpY(bus.d), bx = rx;
          const offset = ((bus.idx % 3) - 1) * 16;
          const color = BUS_COLORS[bus.idx % BUS_COLORS.length];
          return (
            <g key={bus.id}>
              <line x1={bx} y1={by} x2={bx + 18 + offset} y2={by}
                stroke={color} strokeWidth={1} opacity={0.32} strokeDasharray="2,2" />
              <rect x={bx + 8 + offset - 11} y={by - 8} width={24} height={16} rx={3} fill={color} opacity={0.92} />
              <text x={bx + 8 + offset} y={by + 5} textAnchor="middle"
                fontSize={9.5} fontWeight="700" fill="rgba(0,0,0,0.85)">{bus.id + 1}</text>
            </g>
          );
        })}

        {/* Cardinal labels */}
        <text x={rx + 10} y={yP(NUM_STOPS-1) + 4} fontSize={11} fill="rgba(255,255,255,0.28)">N ↑</text>
        <text x={rx + 10} y={yP(0) + 4}           fontSize={11} fill="rgba(255,255,255,0.28)">S ↓</text>
        <text x={W - 4} y={H - 5} textAnchor="end" fontSize={8} fill="rgba(255,255,255,0.15)"
          fontFamily="IBM Plex Mono">{activeBuses.length} active · GTFS</text>
      </svg>
    </div>
  );
};

const HOUR_START = 6;
const HOUR_END   = 22;           // inclusive
const hours = Array.from({length: HOUR_END - HOUR_START + 1}, (_,i) => i + HOUR_START);

const sliceHours = (arr24, fill=0) => {
  if (!Array.isArray(arr24)) return hours.map(() => fill);
  return hours.map(h => {
    const v = arr24[h];
    return (v === null || v === undefined) ? fill : v;
  });
};

const AnalyticsPage = ({ analytics, route, date }) => {
  const [filter, setFilter] = useState('all');
  const [colPct, setColPct] = useState(50);   // % of grid width given to left column
  const [rowPct, setRowPct] = useState(50);   // % of grid height given to top row
  const [dragAxis, setDragAxis] = useState(null);   // 'col' | 'row' | null
  const gridRef = useRef(null);

  useEffect(() => {
    if (!dragAxis) return;
    const onMove = e => {
      const rect = gridRef.current?.getBoundingClientRect();
      if (!rect) return;
      if (dragAxis === 'col') {
        const pct = ((e.clientX - rect.left) / rect.width) * 100;
        setColPct(Math.max(20, Math.min(80, pct)));
      } else {
        const pct = ((e.clientY - rect.top) / rect.height) * 100;
        setRowPct(Math.max(20, Math.min(80, pct)));
      }
    };
    const onUp = () => setDragAxis(null);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    document.body.style.cursor = dragAxis === 'col' ? 'col-resize' : 'row-resize';
    document.body.style.userSelect = 'none';
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    };
  }, [dragAxis]);

  const HOUR_BUNCH  = useMemo(() => sliceHours(analytics && analytics.hour_bunch, 0), [analytics]);
  const HOUR_IDLE   = useMemo(() => sliceHours(analytics && analytics.hour_idle,  0), [analytics]);
  const HOUR_CROWD  = useMemo(() => sliceHours(analytics && analytics.hour_crowd, 0), [analytics]);
  const SPEED_DATA  = useMemo(() => sliceHours(analytics && analytics.speed_by_hour, 0), [analytics]);
  const STOP_FREQ_ALL = (analytics && analytics.stop_frequency) || [];
  const STOP_FREQ_BY_TYPE = (analytics && analytics.stop_frequency_by_type) || {};
  const STOP_FREQ = filter === 'all'
    ? STOP_FREQ_ALL
    : (STOP_FREQ_BY_TYPE[filter] || []);
  const TIME_ALLOC  = useMemo(() => {
    const full = (analytics && analytics.allocation_by_hour) || [];
    return hours.map(h => (full[h] && full[h].length === 4) ? full[h] : [100, 0, 0, 0]);
  }, [analytics]);

  const bData = filter === 'all' || filter === 'bunch' ? HOUR_BUNCH : HOUR_BUNCH.map(() => 0);
  const iData = filter === 'all' || filter === 'idle'  ? HOUR_IDLE  : HOUR_IDLE.map(() => 0);
  const cData = filter === 'all' || filter === 'crowd' ? HOUR_CROWD : HOUR_CROWD.map(() => 0);
  const numVehicles = (analytics && analytics.num_vehicles) || 0;

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', overflow:'hidden', animation:'fadein 0.2s ease' }}>

      {/* Filter bar */}
      <div style={{ display:'flex', gap:8, padding:'10px 20px', borderBottom:'1px solid var(--border)', flexShrink:0, alignItems:'center' }}>
        {[['all','var(--t2)','All Anomalies'],['bunch','var(--bunch)','Bunching'],['idle','var(--idle)','Idling'],['crowd','var(--crowd)','Crowding']].map(([k,c,l]) => (
          <button key={k} onClick={() => setFilter(k)} style={{
            padding:'5px 14px', borderRadius:6, border:'1px solid', cursor:'pointer', fontFamily:'inherit',
            borderColor: filter === k ? c : 'var(--border)',
            background: filter === k ? `${c}14` : 'transparent',
            color: filter === k ? c : 'var(--t3)', fontSize:12, transition:'all 0.14s',
          }}>{l}</button>
        ))}
        <div style={{ marginLeft:'auto', fontSize:11, color:'var(--t3)', fontFamily:'IBM Plex Mono' }}>
          Route {route || '—'} · {date || '—'} · {numVehicles} vehicles
        </div>
      </div>

      {/* 2×2 grid with drag-resizable dividers (one shared column split, one row split). */}
      <div ref={gridRef} style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', position:'relative' }}>

        {/* Top row */}
        <div style={{ display:'flex', height:`calc(${rowPct}% - 3px)`, minHeight:0 }}>
          <div style={{ width:`calc(${colPct}% - 3px)`, minWidth:0, overflow:'hidden' }}>
            <ChartPanel title="Anomaly Frequency by Stop" sub="Event count per stop · ordered along route">
              <SpatialBubbleMap filter={filter} stopFreq={STOP_FREQ} />
            </ChartPanel>
          </div>
          <ResizeHandle axis="col" active={dragAxis === 'col'} onStart={() => setDragAxis('col')} />
          <div style={{ flex:1, minWidth:0, overflow:'hidden' }}>
            <ChartPanel title="Average Operating Speed" sub="km/h · shaded bands = AM/PM peak">
              <SpeedLine data={SPEED_DATA} />
            </ChartPanel>
          </div>
        </div>

        <ResizeHandle axis="row" active={dragAxis === 'row'} onStart={() => setDragAxis('row')} />

        {/* Bottom row (shares the column split so panels align with the top row) */}
        <div style={{ display:'flex', flex:1, minHeight:0 }}>
          <div style={{ width:`calc(${colPct}% - 3px)`, minWidth:0, overflow:'hidden' }}>
            <ChartPanel title="Anomaly Frequency by Hour" sub="Event count · grouped bar">
              <GroupedBar bData={bData} iData={iData} cData={cData} />
            </ChartPanel>
          </div>
          <ResizeHandle axis="col" active={dragAxis === 'col'} onStart={() => setDragAxis('col')} />
          <div style={{ flex:1, minWidth:0, overflow:'hidden' }}>
            <ChartPanel title="Running Time Allocation" sub="% of travel time by anomaly type">
              <StackedBar data={TIME_ALLOC} />
            </ChartPanel>
          </div>
        </div>

      </div>
    </div>
  );
};

const ChartPanel = ({ title, sub, children }) => (
  <div style={{ padding:'16px 18px', overflow:'hidden', display:'flex', flexDirection:'column', height:'100%' }}>
    <div style={{ marginBottom:10 }}>
      <div style={{ fontSize:13, fontWeight:500 }}>{title}</div>
      <div style={{ fontSize:11, color:'var(--t3)' }}>{sub}</div>
    </div>
    <div style={{ flex:1, overflow:'hidden' }}>{children}</div>
  </div>
);

// Drag handle placed between analytics panels. `axis='col'` splits left/right
// (mouse moves horizontally); `axis='row'` splits top/bottom.
const ResizeHandle = ({ axis, active, onStart }) => (
  <div
    onMouseDown={onStart}
    title={axis === 'col' ? 'Drag to resize columns' : 'Drag to resize rows'}
    style={{
      flexShrink: 0,
      width:  axis === 'col' ? 6 : '100%',
      height: axis === 'row' ? 6 : 'auto',
      cursor: axis === 'col' ? 'col-resize' : 'row-resize',
      background: active ? 'var(--accent)' : 'var(--border)',
      transition: active ? 'none' : 'background 0.15s ease',
    }}
  />
);

const SpatialBubbleMap = ({ filter, stopFreq }) => {
  const n = ROUTE29_STOPS.length;
  const src = Array.isArray(stopFreq) ? stopFreq : [];
  const freqs = Array.from({length: n}, (_, i) => src[i] || 0);

  const W = 520, H = 220;
  const PAD = { top: 18, right: 14, bottom: 62, left: 36 };
  const plotW = W - PAD.left - PAD.right;
  const plotH = H - PAD.top - PAD.bottom;
  const barSlot = n > 0 ? plotW / n : plotW;
  const barW = Math.min(barSlot * 0.62, 18);

  const rawMax = Math.max(...freqs, 1);
  const yMax = Math.max(5, Math.ceil(rawMax / 5) * 5);
  const yS = v => PAD.top + plotH - (v / yMax) * plotH;
  const xS = i => PAD.left + i * barSlot + (barSlot - barW) / 2;

  const colorFor = f => f === 'bunch' ? 'var(--bunch)' : f === 'idle' ? 'var(--idle)' : f === 'crowd' ? 'var(--crowd)' : 'var(--accent)';
  const color = colorFor(filter);

  const ticks = [0, 0.25, 0.5, 0.75, 1].map(t => Math.round(t * yMax));
  // Thin out rotated labels when there are many stops so they don't smear.
  const labelStride = n <= 20 ? 1 : n <= 40 ? 2 : Math.ceil(n / 24);

  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet" style={{ width:'100%', height:'100%' }}>
      {/* y gridlines + labels */}
      {ticks.map(v => (
        <g key={v}>
          <line x1={PAD.left} x2={W - PAD.right} y1={yS(v)} y2={yS(v)} stroke="rgba(255,255,255,0.05)" />
          <text x={PAD.left - 6} y={yS(v) + 3.2} textAnchor="end" fontSize={8.5} fill="rgba(255,255,255,0.35)" fontFamily="IBM Plex Mono">{v}</text>
        </g>
      ))}

      {/* baseline */}
      <line x1={PAD.left} x2={W - PAD.right} y1={yS(0)} y2={yS(0)} stroke="rgba(255,255,255,0.18)" />

      {/* bars + rotated stop labels */}
      {ROUTE29_STOPS.map((s, i) => {
        const h = (freqs[i] / yMax) * plotH;
        const x = xS(i);
        const y = yS(freqs[i]);
        const cx = x + barW / 2;
        const showLabel = i % labelStride === 0;
        return (
          <g key={(s.name || s.stop_id || '') + '-' + i}>
            <rect x={x} y={y} width={barW} height={h} fill={color} opacity={0.85} rx={1.5}>
              <title>{`${s.name || 'Stop '+i}: ${freqs[i]} events`}</title>
            </rect>
            {freqs[i] > 0 && (
              <text x={cx} y={y - 4} textAnchor="middle" fontSize={8} fill={color} fontFamily="IBM Plex Mono">{freqs[i]}</text>
            )}
            {showLabel && (
              <text
                x={cx} y={yS(0) + 8}
                textAnchor="end"
                transform={`rotate(-55, ${cx}, ${yS(0) + 8})`}
                fontSize={8.5} fill="rgba(255,255,255,0.55)"
              >{s.name || ''}</text>
            )}
          </g>
        );
      })}

      {/* y-axis title */}
      <text
        x={-H / 2} y={11}
        transform="rotate(-90)"
        textAnchor="middle" fontSize={8.5} fill="rgba(255,255,255,0.4)"
        letterSpacing="0.08em"
      >EVENTS</text>
    </svg>
  );
};

const SpeedLine = ({ data }) => {
  const W=420,H=190;
  const PAD={top:14,right:16,bottom:28,left:32};
  const n=data.length;
  const nonZero = data.filter(v => v > 0);
  const vMin = Math.max(0, Math.floor((nonZero.length ? Math.min(...nonZero) : 0) - 2));
  const vMaxRaw = Math.max(1, ...data);
  const vMax = Math.ceil(vMaxRaw / 5) * 5;
  const range = Math.max(1, vMax - vMin);
  const xS=i=>PAD.left+(i/(n-1))*(W-PAD.left-PAD.right);
  const yS=v=>H-PAD.bottom-((v-vMin)/range)*(H-PAD.top-PAD.bottom);
  const pts = data.map((v,i) => ({ i, v })).filter(p => p.v > 0);
  const path = pts.map((p, k) => `${k===0?'M':'L'}${xS(p.i).toFixed(1)},${yS(p.v).toFixed(1)}`).join(' ');
  const area = pts.length > 1
    ? `${path} L${xS(pts[pts.length-1].i)},${H-PAD.bottom} L${xS(pts[0].i)},${H-PAD.bottom}Z`
    : '';
  const ticks = [vMin + range*0.25, vMin + range*0.5, vMin + range*0.75, vMax].map(Math.round);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width:'100%', height:'100%' }}>
      <defs>
        <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="var(--acc2)" stopOpacity="0.25"/>
          <stop offset="100%" stopColor="var(--acc2)" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {/* Peak shadings */}
      {[[2,6],[9,14]].map(([a,b],j)=>(
        <rect key={j} x={xS(a)} y={PAD.top} width={xS(b)-xS(a)} height={H-PAD.top-PAD.bottom}
          fill="rgba(255,255,255,0.025)" rx={2} />
      ))}
      {ticks.map(v=>(
        <g key={v}>
          <line x1={PAD.left} y1={yS(v)} x2={W-PAD.right} y2={yS(v)} stroke="rgba(255,255,255,0.04)" />
          <text x={PAD.left-5} y={yS(v)+3.5} textAnchor="end" fontSize={8.5} fill="rgba(255,255,255,0.28)">{v}</text>
        </g>
      ))}
      {area && <path d={area} fill="url(#sg)" />}
      {path && <path d={path} fill="none" stroke="var(--acc2)" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" />}
      {pts.map(p=>(
        <circle key={p.i} cx={xS(p.i)} cy={yS(p.v)} r={2.5} fill="var(--acc2)" />
      ))}
      {hours.filter((_,i)=>i%3===0).map((h,j)=>(
        <text key={h} x={xS(j*3)} y={H-PAD.bottom+13} textAnchor="middle" fontSize={8.5} fill="rgba(255,255,255,0.28)">{h}:00</text>
      ))}
      <text x={PAD.left-22} y={(H)/2} textAnchor="middle" fontSize={8} fill="rgba(255,255,255,0.2)"
        transform={`rotate(-90,${PAD.left-22},${H/2})`}>km/h</text>
    </svg>
  );
};

const GroupedBar = ({ bData, iData, cData }) => {
  const W=420,H=190;
  const PAD={top:14,right:16,bottom:28,left:32};
  const n=hours.length;
  const slotW=(W-PAD.left-PAD.right)/n;
  const bw=slotW/3-1.5;
  const xS=i=>PAD.left+i*slotW;
  const rawMax = Math.max(1, ...bData, ...iData, ...cData);
  const maxV = Math.max(5, Math.ceil(rawMax / 5) * 5);
  const yS=v=>H-PAD.bottom-(v/maxV)*(H-PAD.top-PAD.bottom);
  const yH=v=>(v/maxV)*(H-PAD.top-PAD.bottom);
  const ticks = [0.25, 0.5, 0.75, 1.0].map(f => Math.round(maxV * f));
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width:'100%', height:'100%' }}>
      {ticks.map(v=>(
        <g key={v}>
          <line x1={PAD.left} y1={yS(v)} x2={W-PAD.right} y2={yS(v)} stroke="rgba(255,255,255,0.04)" />
          <text x={PAD.left-5} y={yS(v)+3.5} textAnchor="end" fontSize={8.5} fill="rgba(255,255,255,0.28)">{v}</text>
        </g>
      ))}
      {hours.map((h,i)=>(
        <g key={h}>
          {bData[i]>0 && <rect x={xS(i)+0.5}     y={yS(bData[i])} width={bw} height={yH(bData[i])} fill="var(--bunch)" opacity={0.82} rx={1.5} />}
          {iData[i]>0 && <rect x={xS(i)+bw+1.5}   y={yS(iData[i])} width={bw} height={yH(iData[i])} fill="var(--idle)"  opacity={0.82} rx={1.5} />}
          {cData[i]>0 && <rect x={xS(i)+2*bw+2.5} y={yS(cData[i])} width={bw} height={yH(cData[i])} fill="var(--crowd)" opacity={0.82} rx={1.5} />}
          {i%3===0 && <text x={xS(i)+slotW/2} y={H-PAD.bottom+13} textAnchor="middle" fontSize={8.5} fill="rgba(255,255,255,0.28)">{h}:00</text>}
        </g>
      ))}
      {/* Legend */}
      {[['var(--bunch)','Bunching'],['var(--idle)','Idling'],['var(--crowd)','Crowding']].map(([c,l],j)=>(
        <g key={l}>
          <rect x={W-85} y={PAD.top+j*14} width={8} height={8} fill={c} rx={1.5} />
          <text x={W-74} y={PAD.top+j*14+7} fontSize={8.5} fill="rgba(255,255,255,0.4)">{l}</text>
        </g>
      ))}
    </svg>
  );
};

const StackedBar = ({ data }) => {
  const W=420,H=190;
  const PAD={top:14,right:100,bottom:28,left:32};
  const n=data.length;
  const slotW=(W-PAD.left-PAD.right)/n;
  const bw=slotW-2;
  const xS=i=>PAD.left+i*slotW;
  const totalH=H-PAD.top-PAD.bottom;
  const colors=['rgba(255,255,255,0.13)','var(--idle)','var(--bunch)','var(--crowd)'];
  const labels=['Normal','Idling','Bunching','Crowding'];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width:'100%', height:'100%' }}>
      {[25,50,75].map(v=>(
        <g key={v}>
          <line x1={PAD.left} y1={H-PAD.bottom-v/100*totalH} x2={W-PAD.right} y2={H-PAD.bottom-v/100*totalH}
            stroke="rgba(255,255,255,0.04)" />
          <text x={PAD.left-5} y={H-PAD.bottom-v/100*totalH+3.5} textAnchor="end" fontSize={8.5} fill="rgba(255,255,255,0.25)">{v}%</text>
        </g>
      ))}
      {data.map((seg,i)=>{
        let y=H-PAD.bottom;
        return (
          <g key={i}>
            {seg.map((v,j)=>{ const h=(v/100)*totalH; y-=h;
              return <rect key={j} x={xS(i)+0.5} y={y} width={bw} height={h} fill={colors[j]} opacity={j===0?1:0.82} />;
            })}
            {i%4===0 && <text x={xS(i)+bw/2} y={H-PAD.bottom+13} textAnchor="middle" fontSize={8.5} fill="rgba(255,255,255,0.28)">{hours[i]}:00</text>}
          </g>
        );
      })}
      {labels.map((l,j)=>(
        <g key={l}>
          <rect x={W-PAD.right+10} y={PAD.top+j*18} width={10} height={10} fill={colors[j]} rx={2} />
          <text x={W-PAD.right+25} y={PAD.top+j*18+8} fontSize={9} fill="rgba(255,255,255,0.45)">{l}</text>
        </g>
      ))}
    </svg>
  );
};

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#E07B32",
  "density": "compact",
  "showPeakBands": true
}/*EDITMODE-END*/;

const App = () => {
  const [page, setPage] = useState('params');
  const [routeCatalog, setRouteCatalog] = useState([]);   // [{ route_id, direction_id, service_dates, ... }]
  const [params, setParams] = useState({
    route:'501', date:'', dir:'Southbound',
    bunchInt:120, idleMin:5, crowdPct:75,
    bunchDistM:150, bunchMethod:'time',
    stops:[],
  });
  const [applying, setApplying] = useState(false);
  const [busData, setBusData] = useState([]);
  const [analytics, setAnalytics] = useState(null);
  const [totals, setTotals] = useState({ bunch:0, idle:0, crowd:0, bunch_time:0, bunch_dist:0 });
  const [stopsVersion, setStopsVersion] = useState(0);
  const [loadError, setLoadError] = useState(null);
  const [drawerOpen, setDrawerOpen] = useState(false);
  // Latest reported trailing edge of the live slice (minute-of-day).
  // Forecast in LIVE mode pins t_ref here, not to the playhead, so the
  // model sees what the backend actually has evidence for.
  const [liveTimeWindowEnd, setLiveTimeWindowEnd] = useState(null);

  useEffect(() => {
    document.documentElement.style.setProperty('--accent', TWEAK_DEFAULTS.accentColor);
  }, []);

  // If the selected route doesn't support the current direction label
  // (e.g. switching from Dufferin → King leaves "Northbound" stale),
  // snap to a direction that both (a) is valid for the route and (b) has
  // data in the catalog. Prefer catalog-available direction_ids.
  useEffect(() => {
    if (!params.route) return;
    const valid = directionsFor(params.route);
    if (valid.includes(params.dir)) return;
    const availIds = routeCatalog
      .filter(r => r.route_id === params.route)
      .map(r => r.direction_id);
    const pick = availIds.length > 0 ? valid[availIds[0]] : valid[0];
    setParams(p => ({ ...p, dir: pick || valid[0] }));
  }, [params.route, routeCatalog]);

  // Load route catalog once; default to the slice with the freshest data.
  // Picking cat[0] blindly lands on whatever route sorts first by
  // (route_id, direction_id) — which, right after the Toronto service-date
  // rollover, is usually a route with no data for today. That strands the
  // dashboard on a stale historical date with LIVE auto-refresh disabled
  // (isLive needs params.date === todayInToronto()), so new trajectories
  // never appear. Instead, default to the entry carrying the globally newest
  // service_date; ISO YYYY-MM-DD strings compare correctly with `>`.
  useEffect(() => {
    loadRouteCatalog().then(cat => {
      setRouteCatalog(cat);
      if (cat.length === 0) return;
      const newestOf = c => (c.service_dates && c.service_dates[0]) || '';
      const best = cat.reduce((a, b) => (newestOf(b) > newestOf(a) ? b : a));
      const labels = directionsFor(best.route_id);
      setParams(p => ({
        ...p,
        route: best.route_id,
        date: newestOf(best),
        dir: labels[best.direction_id] || labels[0],
      }));
    });
  }, []);

  // Whenever route/direction changes, refresh the stop list so the stop-filter
  // chips in Parameters stay in sync without requiring Apply.
  useEffect(() => {
    if (!params.route) return;
    loadStopsOnly(params.route, directionIdFor(params.dir, params.route)).then(() => {
      setStopsVersion(v => v + 1);
    });
  }, [params.route, params.dir]);

  const handleApply = useCallback(() => {
    if (!params.route || !params.date) return;
    setApplying(true);
    setLoadError(null);
    loadDashboardData(params)
      .then(({ busesRes, analyticsRes }) => {
        setBusData(busesRes.buses || []);
        setAnalytics(analyticsRes || null);
        setTotals(busesRes.totals || { bunch:0, idle:0, crowd:0, bunch_time:0, bunch_dist:0 });
        setLiveTimeWindowEnd(busesRes.time_window?.end ?? null);
        setStopsVersion(v => v + 1);
      })
      .catch(err => {
        console.error('iroam load failed', err);
        setLoadError(String(err && err.message || err));
        setBusData([]);
        setAnalytics(null);
        setTotals({ bunch:0, idle:0, crowd:0, bunch_time:0, bunch_dist:0 });
      })
      .finally(() => setApplying(false));
  }, [params.route, params.date, params.dir, params.bunchInt, params.idleMin, params.crowdPct, params.bunchDistM, params.bunchMethod]);

  // Auto-apply once when the catalog resolves and we have a date to work with.
  useEffect(() => {
    if (params.route && params.date && busData.length === 0 && !applying && !loadError) {
      handleApply();
    }
  }, [params.route, params.date]);  // eslint-disable-line react-hooks/exhaustive-deps

  // LIVE auto-refresh. When the selected date is "today" (Toronto TZ),
  // silently re-hit /iroam/buses + /iroam/analytics every 25 s so new
  // trajectories and anomalies appear without user action. Does NOT touch
  // `applying` (no spinner) or `loadError` (keep last-good on failure).
  const isLive = params.date && params.date === todayInToronto();
  const sliceKey = `${params.route}|${params.date}|${params.dir}`;
  const refreshGen = useRef(0);
  useEffect(() => {
    if (!isLive || !params.route || !params.date) return;
    const tick = async () => {
      const myGen = ++refreshGen.current;
      try {
        const direction_id = directionIdFor(params.dir, params.route);
        const qs =
          `route_id=${encodeURIComponent(params.route)}` +
          `&service_date=${params.date}` +
          `&direction_id=${direction_id}` +
          `&bunch_sec=${params.bunchInt}` +
          `&idle_min=${params.idleMin}` +
          `&crowd_pct=${params.crowdPct}` +
          `&bunch_dist=${params.bunchDistM}` +
          `&bunch_method=${params.bunchMethod}`;
        const [busesRes, analyticsRes] = await Promise.all([
          fetchJSON(`/iroam/buses?${qs}`),
          fetchJSON(`/iroam/analytics?${qs}`),
        ]);
        if (refreshGen.current !== myGen) return;   // stale
        applyStopsAndWindow(null, busesRes.time_window);
        setBusData(busesRes.buses || []);
        setAnalytics(analyticsRes || null);
        setTotals(busesRes.totals || { bunch:0, idle:0, crowd:0, bunch_time:0, bunch_dist:0 });
        setLiveTimeWindowEnd(busesRes.time_window?.end ?? null);
      } catch (err) {
        console.warn('iroam LIVE refresh failed', err);
      }
    };
    const id = setInterval(tick, 25000);
    return () => clearInterval(id);
  }, [isLive, sliceKey, params.bunchInt, params.idleMin, params.crowdPct, params.bunchDistM, params.bunchMethod]);

  const handleSetPage = p => { setPage(p); if (p === 'params') setDrawerOpen(false); };

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
      <Sidebar active={page} setActive={handleSetPage} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <TopBar page={page} route={params.route} date={params.date} dir={params.dir} totals={totals}
          drawerOpen={drawerOpen} setDrawerOpen={setDrawerOpen} isLive={isLive} />
        {loadError && (
          <div style={{ background:'rgba(255,90,90,0.14)', color:'var(--idle)', padding:'6px 22px', fontSize:12, borderBottom:'1px solid var(--border)' }}>
            Load error: {loadError}
          </div>
        )}
        <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
          <div style={{ flex:1, overflow:'hidden' }}>
            {page === 'params'   && <ParameterPanel params={params} setP={setParams} onApply={handleApply} applying={applying} routeCatalog={routeCatalog} stopsVersion={stopsVersion} />}
            {page === 'playback' && <PlaybackPage
              busData={busData}
              sliceKey={sliceKey}
              isLive={isLive}
              route={params.route}
              serviceDate={params.date}
              directionId={directionIdFor(params.dir, params.route)}
              liveTimeWindowEnd={liveTimeWindowEnd}
            />}
            {page === 'analysis' && <AnalyticsPage analytics={analytics} route={params.route} date={params.date} />}
          </div>
          {page !== 'params' && drawerOpen && (
            <ParamDrawer params={params} setP={setParams} onApply={handleApply} applying={applying} routeCatalog={routeCatalog} />
          )}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
