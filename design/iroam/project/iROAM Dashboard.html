// Convert compact AVL format to component format, filtered by thresholds
function processAVLData(bunchSec, idleMin, crowdPct) {
  const typeMap = { i: 'idle', b: 'bunch', c: 'crowd' };
  return AVL_RAW.map(bus => ({
    id: bus.id,
    vehicle_id: bus.k.split('_')[0],
    points: bus.p.map(([t, d]) => ({ t, d })),
    anomalies: bus.a
      .map(([t, d, code]) => ({ t, d, type: typeMap[code] }))
      .filter(a => {
        if (a.type === 'idle')  return idleMin <= 5;   // show if threshold is permissive
        if (a.type === 'bunch') return bunchSec >= 60; // show if threshold is permissive
        if (a.type === 'crowd') return crowdPct <= 100;
        return true;
      }),
  }));
}

function seededRand(seed) {
  let s = seed;
  return () => { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };

    const anomalies = [];
    let t = START_T + b * 13 + rand() * 6 - 3;
    let d = 0;

    while (d < NUM_STOPS - 1 && t < END_T - 30) {
      // Optional idle event
      if (rand() < 0.11) {
        const dur = idleThreshMin * (0.8 + rand() * 1.2);
        anomalies.push({ t, d, type: 'idle' });
        points.push({ t, d });
        t += dur;
        points.push({ t, d });
      }

      // Travel to next segment
      const dist = 0.7 + rand() * 0.6;
      const speed = 0.02 + rand() * 0.015; // stops per minute
      const travel = dist / speed;
      t += travel;
      d = Math.min(d + dist, NUM_STOPS - 1);
      points.push({ t, d });

      // Crowding near central stops
      if (d > 3 && d < 9 && rand() < 0.12) {
        anomalies.push({ t, d, type: 'crowd' });
      }
    }

    buses.push({ id: b, points, anomalies });
  }

  // Inject bunching clusters (headway collapse)
  const bunchFactor = Math.max(0.3, 1 - bunchInt / 300);
  [[2,3,4,580,5],[6,7,8,820,8]].forEach(([a, b2, c, tc, dc]) => {
    if (rand() + bunchFactor > 0.6) {
      [a, b2, c].forEach((idx, i) => {
        if (buses[idx]) buses[idx].anomalies.push({ t: tc + i * 4, d: dc + rand() * 1.5, type: 'bunch' });
      });
    }
  });

  return buses;
}

const PlaybackPage = ({ busData }) => {
  const [playing, setPlaying] = useState(false);
  const [t, setT] = useState(START_T);
  const [vis, setVis] = useState({ bunch: true, idle: true, crowd: true });
  const rafRef = useRef(null);

  const fmt = m => {
    const h = Math.floor(m / 60), mn = Math.floor(m % 60);
    return `${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;
  };

  useEffect(() => {
    if (playing) {
      const step = () => {
        setT(cur => {
          if (cur >= END_T) { setPlaying(false); return END_T; }
          return cur + 1.5;
        });
        rafRef.current = requestAnimationFrame(step);
      };
      rafRef.current = requestAnimationFrame(step);
    } else cancelAnimationFrame(rafRef.current);
    return () => cancelAnimationFrame(rafRef.current);
  }, [playing]);

  const pct = (t - START_T) / (END_T - START_T) * 100;

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', animation:'fadein 0.2s ease' }}>

      <div style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 20px',

          color: playing ? 'var(--accent)' : 'var(--t1)', cursor:'pointer',
          display:'flex', alignItems:'center', justifyContent:'center',
        }}><Ic n={playing ? 'pause' : 'play'} size={13} /></button>

        <button onClick={() => { setT(START_T); setPlaying(false); }} style={{
          width:34, height:34, borderRadius:7, border:'1px solid var(--border)',
          background:'var(--s2)', color:'var(--t2)', cursor:'pointer',
          display:'flex', alignItems:'center', justifyContent:'center',

          <span style={{ fontFamily:'IBM Plex Mono', fontSize:12, color:'var(--accent)', minWidth:40 }}>{fmt(t)}</span>

const TDDiagram = ({ busData, currentT, vis, fmt }) => {
  const W = 760, H = 460;
  const PAD = { top: 24, right: 28, bottom: 40, left: 70 };
  const xS = t => PAD.left + (t - START_T) / (END_T - START_T) * (W - PAD.left - PAD.right);
  const yS = d => {
    const lo = Math.floor(Math.min(d, NUM_STOPS - 2));
    const t = d - lo;
    const yLo = PAD.top + (1 - stopLatNorm(lo))     * (H - PAD.top - PAD.bottom);
    const yHi = PAD.top + (1 - stopLatNorm(lo + 1)) * (H - PAD.top - PAD.bottom);
    return yLo + t * (yHi - yLo);
  };
  const xTicks = [360,480,600,720,840,960,1080,1200,1320];

  return (
    <div style={{ flex:1.5, borderRight:'1px solid var(--border)', overflow:'hidden', position:'relative' }}>
      <div style={{ padding:'10px 16px 0', fontSize:10, color:'var(--t3)', letterSpacing:'0.08em', textTransform:'uppercase' }}>Time–Distance Diagram</div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width:'100%', height:'calc(100% - 28px)', display:'block' }}>

        {/* Grid */}
        {xTicks.map(tick => (
          <g key={tick}>
            <line x1={xS(tick)} y1={PAD.top} x2={xS(tick)} y2={H - PAD.bottom}
              stroke="rgba(255,255,255,0.04)" strokeWidth={1} />
            <text x={xS(tick)} y={H - PAD.bottom + 14} textAnchor="middle" fontSize={9} fill="rgba(255,255,255,0.28)">{fmt(tick)}</text>
          </g>
        ))}
        {ROUTE29_STOPS.map((s, i) => (
          <g key={s.name}>
            <line x1={PAD.left} y1={yS(i)} x2={W - PAD.right} y2={yS(i)}
              stroke={i % 4 === 0 ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.025)'} strokeWidth={1} />
            <text x={PAD.left - 7} y={yS(i) + 3.5} textAnchor="end" fontSize={9.5} fill="rgba(255,255,255,0.32)">{s.name}</text>
          </g>
        ))}

        {/* Peak shading */}
        {[[480,600],[900,1080]].map(([a,b], i) => (
          <rect key={i} x={xS(a)} y={PAD.top} width={xS(b)-xS(a)} height={H - PAD.top - PAD.bottom}
            fill="rgba(255,255,255,0.015)" />
        ))}

        {/* Trajectories */}
        {busData.map((bus, idx) => {
          const pts = bus.points.filter(p => p.t <= currentT);
          if (pts.length < 2) return null;
          const d = pts.map((p, i) => `${i===0?'M':'L'}${xS(p.t).toFixed(1)},${yS(p.d).toFixed(1)}`).join(' ');
          return <path key={bus.id} d={d} fill="none"
            stroke={BUS_COLORS[idx % BUS_COLORS.length]} strokeWidth={1.8}
            opacity={0.75} strokeLinecap="round" strokeLinejoin="round" />;
        })}

        {/* Anomaly markers */}
        {busData.flatMap((bus, idx) =>
          bus.anomalies.filter(a => a.t <= currentT && vis[a.type]).map((a, j) => {
            const x = xS(a.t), y = yS(a.d);
            const color = a.type === 'bunch' ? 'var(--bunch)' : a.type === 'idle' ? 'var(--idle)' : 'var(--crowd)';
            if (a.type === 'crowd') return <circle key={`${bus.id}-${j}`} cx={x} cy={y} r={4.5} fill={color} opacity={0.9} stroke="var(--bg)" strokeWidth={1} />;
            return <polygon key={`${bus.id}-${j}`} points={`${x},${y-6} ${x-4.5},${y+3.5} ${x+4.5},${y+3.5}`} fill={color} opacity={0.9} />;
          })
        )}

        {/* Playhead */}
        <line x1={xS(currentT)} y1={PAD.top} x2={xS(currentT)} y2={H - PAD.bottom}
          stroke="var(--accent)" strokeWidth={1.5} strokeDasharray="5,3" opacity={0.85} />
        <polygon points={`${xS(currentT)},${PAD.top} ${xS(currentT)-5},${PAD.top-9} ${xS(currentT)+5},${PAD.top-9}`}
          fill="var(--accent)" />

        {/* Axis labels */}
        <text x={(PAD.left + W - PAD.right) / 2} y={H - 4} textAnchor="middle" fontSize={9} fill="rgba(255,255,255,0.2)">Time of Day</text>
        <text x={12} y={(PAD.top + H - PAD.bottom) / 2} textAnchor="middle" fontSize={9} fill="rgba(255,255,255,0.2)"
          transform={`rotate(-90,12,${(PAD.top + H - PAD.bottom) / 2})`}>Distance Along Route →</text>
      </svg>
    </div>
  );
};

const SchematicMap = ({ busData, currentT, vis }) => {
  const containerRef = useRef(null);
  const [dims, setDims] = useState({ w: 270, h: 500 });

  useEffect(() => {
    if (!containerRef.current) return;
    const obs = new ResizeObserver(([entry]) => {
      const { width, height } = entry.contentRect;
      setDims({ w: Math.max(width, 120), h: Math.max(height - 30, 200) });
    });
    obs.observe(containerRef.current);
    return () => obs.disconnect();
  }, []);

  const W = dims.w, H = dims.h;
  const PAD = { top: 24, bottom: 20, left: 10, right: 10 };
  const rx = W / 2; // centered route line

  const yP = i => {
    const norm = stopLatNorm(i);
    return H - PAD.bottom - norm * (H - PAD.top - PAD.bottom);
  };
  const xP = () => rx;

  const interpY = d => {
    const lo = Math.floor(Math.min(d, NUM_STOPS - 2));
    const t = d - lo;
    return yP(lo) + t * (yP(lo + 1) - yP(lo));
  };
  const interpX = d => {
    const lo = Math.floor(Math.min(d, NUM_STOPS - 2));
    const t = d - lo;
    return xP(lo) + t * (xP(lo + 1) - xP(lo));
  };

  const activeBuses = busData.map((bus, idx) => {
    const pts = bus.points.filter(p => p.t <= currentT);
    if (!pts.length) return null;
    return { ...bus, d: pts[pts.length - 1].d, idx };
  }).filter(Boolean);

  const anomHeat = {};
  busData.forEach(bus => bus.anomalies.filter(a => a.t <= currentT && vis[a.type]).forEach(a => {
    const si = Math.round(a.d);
    anomHeat[si] = (anomHeat[si] || 0) + 1;
  }));

  const routePath = ROUTE29_STOPS.map((_, i) =>
    `${i === 0 ? 'M' : 'L'}${rx.toFixed(1)},${yP(i).toFixed(1)}`
  ).join(' ');

  return (
    <div ref={containerRef} style={{ width: 270, overflow: 'hidden', position: 'relative', flexShrink: 0, display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '10px 16px 0', fontSize: 10, color: 'var(--t3)', letterSpacing: '0.08em', textTransform: 'uppercase', flexShrink: 0 }}>
        Spatial View · Dufferin (GTFS)
      </div>
      <svg width="100%" height="100%" style={{ display: 'block', flex: 1 }}>

        {/* Route glow + line */}
        <path d={routePath} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={8} strokeLinecap="round" strokeLinejoin="round" />
        <path d={routePath} fill="none" stroke="rgba(255,255,255,0.14)" strokeWidth={3} strokeLinecap="round" strokeLinejoin="round" />

        {/* Anomaly heat halos */}
        {Object.entries(anomHeat).map(([si, cnt]) => (
          <circle key={si} cx={rx} cy={yP(+si)} r={7 + cnt * 3} fill="var(--idle)" opacity={0.09} />
        ))}

        {/* Stops — proportionally spaced by real latitude */}
        {ROUTE29_STOPS.map((s, i) => (
          <g key={s.name}>
            <circle cx={rx} cy={yP(i)} r={5} fill="var(--s3)" stroke="rgba(255,255,255,0.28)" strokeWidth={1.8} />
            <text x={rx - 14} y={yP(i) + 4} textAnchor="end" fontSize={11} fill="rgba(255,255,255,0.5)">{s.name}</text>
          </g>
        ))}

        {/* Active bus markers */}
        {activeBuses.map(bus => {
          const by = interpY(bus.d), bx = rx;
          const offset = ((bus.idx % 3) - 1) * 16;
          const color = BUS_COLORS[bus.idx % BUS_COLORS.length];
          return (
            <g key={bus.id}>
              <line x1={bx} y1={by} x2={bx + 18 + offset} y2={by}
                stroke={color} strokeWidth={1} opacity={0.32} strokeDasharray="2,2" />
              <rect x={bx + 8 + offset - 11} y={by - 8} width={24} height={16} rx={3} fill={color} opacity={0.92} />
              <text x={bx + 8 + offset} y={by + 5} textAnchor="middle"
                fontSize={9.5} fontWeight="700" fill="rgba(0,0,0,0.85)">{bus.id + 1}</text>
            </g>
          );
        })}

        {/* Cardinal labels */}
        <text x={rx + 10} y={yP(NUM_STOPS-1) + 4} fontSize={11} fill="rgba(255,255,255,0.28)">N ↑</text>
        <text x={rx + 10} y={yP(0) + 4}           fontSize={11} fill="rgba(255,255,255,0.28)">S ↓</text>
        <text x={W - 4} y={H - 5} textAnchor="end" fontSize={8} fill="rgba(255,255,255,0.15)"
          fontFamily="IBM Plex Mono">{activeBuses.length} active · GTFS</text>
      </svg>
    </div>
  );
};

  const path=data.map((v,i)=>`${i===0?'M':'L'}${xS(i).toFixed(1)},${yS(v).toFixed(1)}`).join(' ');
  const area=`${path} L${xS(n-1)},${H-PAD.bottom} L${xS(0)},${H-PAD.bottom}Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width:'100%', height:'100%' }}>

const StackedBar = ({ data }) => {
  const W=420,H=190;
  const PAD={top:14,right:100,bottom:28,left:32};
  const n=data.length;
  const slotW=(W-PAD.left-PAD.right)/n;
  const bw=slotW-2;
  const xS=i=>PAD.left+i*slotW;
  const totalH=H-PAD.top-PAD.bottom;
  const colors=['rgba(255,255,255,0.13)','var(--idle)','var(--bunch)','var(--crowd)'];
  const labels=['Normal','Idling','Bunching','Crowding'];

    <svg viewBox={`0 0 ${W} ${H}`} style={{ width:'100%', height:'100%' }}>

        <g key={v}>
          <line x1={PAD.left} y1={H-PAD.bottom-v/100*totalH} x2={W-PAD.right} y2={H-PAD.bottom-v/100*totalH}

        return (
          <g key={i}>

        <g key={l}>
          <rect x={W-PAD.right+10} y={PAD.top+j*18} width={10} height={10} fill={colors[j]} rx={2} />

        </g>
      ))}
    </svg>
  );
};

  return (
    <div style={{
      width: 272, flexShrink: 0, background: 'var(--s1)',
      borderLeft: '1px solid var(--border)', display: 'flex', flexDirection: 'column',
      animation: 'slideInRight 0.2s ease', overflow: 'hidden',
    }}>
      {/* Header */}
      <div style={{ padding: '14px 16px 12px', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
        <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--t3)' }}>Quick Parameters</div>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '14px 16px' }}>

        {/* Route + Date */}
        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 11, color: 'var(--t3)', marginBottom: 5 }}>Route</div>
          <select value={route} onChange={e => setP(p => ({ ...p, route: e.target.value }))} style={sel}>
            {['29','510','504','7','35'].map(r => <option key={r} value={r}>Route {r}</option>)}
          </select>
        </div>

        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 11, color: 'var(--t3)', marginBottom: 5 }}>Date</div>
          <input type="date" value={date} onChange={e => setP(p => ({ ...p, date: e.target.value }))} style={sel} />
        </div>

        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: 'var(--t3)', marginBottom: 5 }}>Direction</div>
          <div style={{ display: 'flex', gap: 6 }}>
            {['Northbound','Southbound'].map(d => (
              <button key={d} onClick={() => setP(p => ({ ...p, dir: d }))} style={{
                flex: 1, padding: '6px 0', border: '1px solid', borderRadius: 6, cursor: 'pointer', fontSize: 11,
                borderColor: dir === d ? (d === 'Northbound' ? 'var(--acc2)' : '#A78BFA') : 'var(--border)',
                background: dir === d ? (d === 'Northbound' ? 'rgba(27,184,176,0.1)' : 'rgba(167,139,250,0.1)') : 'transparent',
                color: dir === d ? (d === 'Northbound' ? 'var(--acc2)' : '#A78BFA') : 'var(--t3)',
                transition: 'all 0.14s',
              }}>{d === 'Northbound' ? '↑ NB' : '↓ SB'}</button>
            ))}
          </div>
        </div>

        <Divider my={4} />

        {/* Thresholds */}
        <div style={{ marginTop: 12 }}>
          {[
            { k:'bunchInt', color:'var(--bunch)', label:'Bunching ≤', unit:' sec', min:30, max:300, step:10, val:bunchInt },
            { k:'idleMin',  color:'var(--idle)',  label:'Idling ≥',   unit:' min', min:1,  max:20,  step:0.5, val:idleMin },
            { k:'crowdPct', color:'var(--crowd)', label:'Crowding ≥', unit:'%',    min:50, max:150, step:5,   val:crowdPct },
          ].map(({ k, color, label, unit, min, max, step, val }) => (
            <div key={k} style={{ marginBottom: 16 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6, fontSize: 12 }}>
                <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                  <span style={{ width: 6, height: 6, borderRadius: '50%', background: color, display: 'inline-block', boxShadow: `0 0 6px ${color}` }} />
                  <span style={{ color: 'var(--t2)' }}>{label}</span>
                </span>
                <span style={{ fontFamily: 'IBM Plex Mono', color, fontWeight: 500, fontSize: 11 }}>{val}{unit}</span>
              </div>
              <input type="range" min={min} max={max} step={step} value={val}
                onChange={e => setP(p => ({ ...p, [k]: +e.target.value }))}
                style={{ accentColor: color }} />
            </div>
          ))}
        </div>
      </div>

      {/* Apply button */}
      <div style={{ padding: '12px 16px', borderTop: '1px solid var(--border)', flexShrink: 0 }}>
        <button onClick={onApply} disabled={applying} style={{
          width: '100%', padding: '9px 0', borderRadius: 7, border: 'none',
          background: applying ? 'var(--s3)' : 'var(--accent)',
          color: applying ? 'var(--t2)' : '#fff',
          fontSize: 13, fontWeight: 600, cursor: applying ? 'wait' : 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7,
          transition: 'all 0.18s',
        }}>
          {applying
            ? <><span style={{ display:'inline-block', animation:'spin 0.8s linear infinite' }}>⟳</span> Processing…</>
            : '↻ Apply & Reprocess'}
        </button>
        {applying && (
          <div style={{ marginTop: 8, background: 'var(--s2)', borderRadius: 6, padding: '8px 10px', animation: 'fadein 0.2s ease' }}>
            <div style={{ background: 'var(--s3)', height: 3, borderRadius: 2, overflow: 'hidden' }}>
              <div style={{ height: '100%', background: 'var(--accent)', borderRadius: 2, animation: 'prog 1.8s ease forwards' }} />
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// APP ROOT
// ─────────────────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#E07B32",
  "density": "compact",
  "showPeakBands": true
}/*EDITMODE-END*/;

const App = () => {
  const [page, setPage] = useState('params');
  const [params, setParams] = useState({
    route:'29', date:'2026-04-21', dir:'Northbound',
    bunchInt:120, idleMin:5, crowdPct:100, stops:[],
  });
  const [applying, setApplying] = useState(false);
  const [busData, setBusData] = useState(() => processAVLData(120, 5, 100));
  const [drawerOpen, setDrawerOpen] = useState(false);

  useEffect(() => {
    document.documentElement.style.setProperty('--accent', TWEAK_DEFAULTS.accentColor);
  }, []);

  const handleApply = useCallback(() => {
    setApplying(true);
    setTimeout(() => {
      setBusData(processAVLData(params.bunchInt, params.idleMin, params.crowdPct));
      setApplying(false);
    }, 1200);
  }, [params.bunchInt, params.idleMin, params.crowdPct]);

  const handleSetPage = p => { setPage(p); if (p === 'params') setDrawerOpen(false); };

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
      <Sidebar active={page} setActive={handleSetPage} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <TopBar page={page} route={params.route} date={params.date} dir={params.dir}
          drawerOpen={drawerOpen} setDrawerOpen={setDrawerOpen} />
        <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
          <div style={{ flex:1, overflow:'hidden' }}>
            {page === 'params'   && <ParameterPanel params={params} setP={setParams} onApply={handleApply} applying={applying} />}
            {page === 'playback' && <PlaybackPage busData={busData} />}
            {page === 'analysis' && <AnalyticsPage />}
          </div>
          {page !== 'params' && drawerOpen && (
            <ParamDrawer params={params} setP={setParams} onApply={handleApply} applying={applying} />
          )}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
